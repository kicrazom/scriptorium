[project]
name = "scriptorium"
version = "0.2.0"
description = "Sovereign rigor/audit layer for the scientific knowledge lifecycle"
requires-python = ">=3.10"
dependencies = [
    "statsmodels>=0.14",
    "scipy>=1.11",
    "pingouin>=0.5.4",
    "lifelines>=0.27",
    "PyYAML>=6.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.setuptools.packages.find]
include = ["scripts*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
