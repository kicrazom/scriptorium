name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (with dev deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check scripts/ tests/

      - name: Run tests (with coverage; engines run as subprocesses → patch=subprocess)
        run: pytest --cov -q   # coverage gate fail_under=80 enforced via pyproject

  # The grimmer + interim_boundaries engines need R (scrutiny / gsDesign), which this runner
  # lacks; their tests skip automatically (pytest.mark.skipif), so this matrix stays green.
  # A dedicated R job (ci-r.yml) installs R and runs them for real.
